<svg xmlns="http://www.w3.org/2000/svg" width="56" height="24" viewBox="0 0 56 24">
  <!-- "Gigi Balang": the pierced hanging-teeth fringe from Betawi house fascia
       boards. Jingga rail + kuning teeth (the brand color is literally named
       Kuning Gigi Balang). Tiles horizontally as an edge trim. -->
  <rect width="56" height="4.5" fill="#FC351C"/>
  <polygon points="1,4.5 27,4.5 14,24" fill="#FEB52B"/>
  <polygon points="29,4.5 55,4.5 42,24" fill="#FEB52B"/>
  <circle cx="14" cy="10.5" r="2" fill="#FFF8F1"/>
  <circle cx="42" cy="10.5" r="2" fill="#FFF8F1"/>
</svg>
