<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
  <!-- "Tegel Kunci": old-Batavia encaustic floor tile — center diamond, quarter
       medallions at the corners. Kept at whisper opacity so it reads as floor
       texture under the cards, never as decoration competing with content. -->
  <g fill="none" stroke="#1A1320" stroke-opacity=".03" stroke-width="1.3">
    <rect x=".65" y=".65" width="70.7" height="70.7"/>
    <rect x="15" y="15" width="42" height="42" transform="rotate(45 36 36)"/>
  </g>
  <g fill="#FC351C" fill-opacity=".022">
    <path d="M0 0 H13 A13 13 0 0 1 0 13 Z"/>
    <path d="M72 0 V13 A13 13 0 0 1 59 0 Z"/>
    <path d="M72 72 H59 A13 13 0 0 1 72 59 Z"/>
    <path d="M0 72 V59 A13 13 0 0 1 13 72 Z"/>
  </g>
  <circle cx="36" cy="36" r="4.5" fill="#1FAE5D" fill-opacity=".05"/>
</svg>
