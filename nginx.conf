server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    # NOTE: do NOT add a `types {}` block here — it REPLACES the whole MIME table
    # (loaded via mime.types in the base config) and would make nginx serve
    # index.html/css as octet-stream → browser downloads instead of rendering.

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # HTML + the editable config must always be revalidated.
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /config.js  { add_header Cache-Control "no-cache"; }

    # Vendored Leaflet is versioned/immutable — cache hard. (^~ so the css/js
    # regex below doesn't override it.)
    location ^~ /vendor/ { add_header Cache-Control "public, max-age=31536000, immutable"; }

    # App CSS/JS: always revalidate (avoids stale styles during iteration).
    location ~* \.(css|js)$ { add_header Cache-Control "no-cache"; }

    # If you self-host raster tiles in a ./tiles folder, cache them long.
    location /tiles/  { add_header Cache-Control "public, max-age=604800"; }

    # Reverse-proxy the backend API. Trailing slash strips the /api prefix:
    #   /api/activities  ->  http://api:3000/activities
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
